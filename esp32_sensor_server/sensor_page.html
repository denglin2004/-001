<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 传感器监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .sensor-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .sensor-card:hover {
            transform: translateY(-5px);
        }
        .sensor-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .sensor-name {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .sensor-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
        }
        .sensor-unit {
            font-size: 1em;
            color: #999;
        }
        .temp { border-top: 5px solid #ff6b6b; }
        .humi { border-top: 5px solid #4ecdc4; }
        .light { border-top: 5px solid #ffe66d; }
        .soil { border-top: 5px solid #95e1d3; }
        .status {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .status-text {
            color: #666;
            margin-bottom: 10px;
        }
        .update-time {
            color: #333;
            font-weight: bold;
            font-size: 1.2em;
        }
        .ip-input {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .ip-input input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            width: 200px;
            margin-right: 10px;
        }
        .ip-input button {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
        }
        .ip-input button:hover {
            background: #5a67d8;
        }
        .demo-btn {
            margin-top: 10px;
            background: #48bb78 !important;
        }
        .error {
            color: #e53e3e;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 ESP32 传感器监控</h1>

        <div class="ip-input">
            <label>ESP32 IP 地址: </label>
            <input type="text" id="espIp" placeholder="192.168.1.100" value="192.168.1.100">
            <button onclick="connect()">连接</button>
            <button class="demo-btn" onclick="startDemo()">演示模式</button>
            <div id="errorMsg" class="error"></div>
        </div>

        <div class="sensor-grid">
            <div class="sensor-card temp">
                <div class="sensor-icon">🌡️</div>
                <div class="sensor-name">温度</div>
                <div class="sensor-value" id="temp">--</div>
                <div class="sensor-unit">°C</div>
            </div>
            <div class="sensor-card humi">
                <div class="sensor-icon">💧</div>
                <div class="sensor-name">湿度</div>
                <div class="sensor-value" id="humi">--</div>
                <div class="sensor-unit">%</div>
            </div>
            <div class="sensor-card light">
                <div class="sensor-icon">☀️</div>
                <div class="sensor-name">光照</div>
                <div class="sensor-value" id="light">--</div>
                <div class="sensor-unit">lux</div>
            </div>
            <div class="sensor-card soil">
                <div class="sensor-icon">🌿</div>
                <div class="sensor-name">土壤湿度</div>
                <div class="sensor-value" id="soil">--</div>
                <div class="sensor-unit">%</div>
            </div>
        </div>

        <div class="status">
            <div class="status-text">最后更新时间</div>
            <div class="update-time" id="time">等待连接...</div>
        </div>
    </div>

    <script>
        let updateInterval = null;
        let demoMode = false;

        function connect() {
            const ip = document.getElementById('espIp').value;
            if (!ip) {
                document.getElementById('errorMsg').textContent = '请输入 IP 地址';
                return;
            }

            demoMode = false;
            if (updateInterval) clearInterval(updateInterval);

            updateData(ip);
            updateInterval = setInterval(() => updateData(ip), 2000);
        }

        function updateData(ip) {
            if (demoMode) return;

            fetch(`http://${ip}/api/sensors`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('temp').textContent = data.temperature.toFixed(1);
                    document.getElementById('humi').textContent = data.humidity.toFixed(1);
                    document.getElementById('light').textContent = data.light;
                    document.getElementById('soil').textContent = data.soilMoisture;
                    document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
                    document.getElementById('errorMsg').textContent = '';
                })
                .catch(err => {
                    console.error('获取数据失败:', err);
                    document.getElementById('time').textContent = '连接失败 - ' + new Date().toLocaleTimeString('zh-CN');
                    document.getElementById('errorMsg').textContent = '无法连接到 ESP32，请检查 IP 地址和网络';
                });
        }

        function startDemo() {
            demoMode = true;
            if (updateInterval) clearInterval(updateInterval);

            document.getElementById('errorMsg').textContent = '演示模式 - 模拟数据';

            function generateDemoData() {
                document.getElementById('temp').textContent = (20 + Math.random() * 15).toFixed(1);
                document.getElementById('humi').textContent = (40 + Math.random() * 40).toFixed(1);
                document.getElementById('light').textContent = Math.floor(300 + Math.random() * 700);
                document.getElementById('soil').textContent = Math.floor(30 + Math.random() * 50);
                document.getElementById('time').textContent = new Date().toLocaleString('zh-CN') + ' (演示)';
            }

            generateDemoData();
            updateInterval = setInterval(generateDemoData, 2000);
        }
    </script>
</body>
</html>
